databases:
  - name: quay651-sunbelt-diag-db
    plan: free
    databaseName: sunbelt_diag
    user: sunbelt_user

services:
  # Flask + Socket.IO API. Free plan sleeps after ~15 min idle and takes
  # 30-60s to wake on the next request; the free-tier disk is ephemeral, so
  # uploaded photo files (not the cached AI analysis text, which lives in
  # Postgres) don't survive a restart/redeploy/sleep-wake cycle.
  #
  # The frontend is NOT deployed here -- it's built and published to GitHub
  # Pages via .github/workflows/deploy-frontend.yml instead.
  - type: web
    name: quay651-sunbelt-diag-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quay651-sunbelt-diag-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-opus-4-1-20250805
      - key: CLAUDE_VISION_MODEL
        value: claude-opus-4-1-20250805
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: MAX_UPLOAD_SIZE_MB
        value: "15"
      - key: UPLOAD_FOLDER
        value: /app/uploads
      - key: FRONTEND_ORIGIN
        value: https://quay651.github.io
      - key: DEMO_PASSCODE
        sync: false
