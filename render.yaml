databases:
  - name: quay651-sunbelt-diag-db
    plan: free
    databaseName: sunbelt_diag
    user: sunbelt_user

services:
  # Flask + Socket.IO API. Free plan sleeps after ~15 min idle and takes
  # 30-60s to wake on the next request; the free-tier disk is ephemeral, so
  # uploaded photo files (not the cached AI analysis text, which lives in
  # Postgres) don't survive a restart/redeploy/sleep-wake cycle.
  - type: web
    name: quay651-sunbelt-diag-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quay651-sunbelt-diag-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-opus-4-1-20250805
      - key: CLAUDE_VISION_MODEL
        value: claude-opus-4-1-20250805
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: MAX_UPLOAD_SIZE_MB
        value: "15"
      - key: UPLOAD_FOLDER
        value: /app/uploads
      # Update if Render assigns a different hostname than expected (service
      # names must be globally unique on Render).
      - key: FRONTEND_ORIGIN
        value: https://quay651-sunbelt-diag-frontend.onrender.com
      - key: DEMO_PASSCODE
        sync: false

  # React static build. Genuinely always-on (CDN-served, no sleep) on the
  # free tier -- only the backend above has the cold-start behavior.
  - type: web
    name: quay651-sunbelt-diag-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      # Update if Render assigns a different hostname than expected.
      - key: REACT_APP_API_URL
        value: https://quay651-sunbelt-diag-backend.onrender.com
